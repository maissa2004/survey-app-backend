spring.application.name=AppEnquetes1
spring.datasource.url=jdbc:mysql://localhost:3306/app_enquetevp
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


#desactiver completement Spring Security
#spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.SecurityAutoConfiguration

# JWT Configuration

jwt.secret=mySecretKeyForJWTTokenGeneration2025!VeryLongAndSecureKeyForProduction
jwt.expiration=86400000
# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
# DevTools (pour le rechargement automatique)

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8081

