spring.application.name=AppEnquetes1
spring.datasource.url=jdbc:mysql://localhost:3306/app_enquetevp
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
ddl-auto=update

#desactiver completement Spring Security
#spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.SecurityAutoConfiguration

spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.properties.hibernate.batch_fetch_style=dynamic
# JWT Configuration

jwt.secret=mySecretKeyForJWTTokenGeneration2025!VeryLongAndSecureKeyForProduction
jwt.expiration=604800000
# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.appenquetes1=DEBUG

# DevTools (pour le rechargement automatique)

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8081
server.address=0.0.0.0

